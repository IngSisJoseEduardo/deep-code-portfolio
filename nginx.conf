server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Assets generados por Astro (_astro/) — cache agresivo (contenido hasheado)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Imágenes y fuentes estáticas — cache largo
    location ~* \.(png|jpg|jpeg|webp|avif|gif|ico|svg|woff2|woff|ttf)$ {
        expires 6M;
        add_header Cache-Control "public, no-transform";
    }

    # HTML — sin cache (garantiza contenido fresco en cada deploy)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback: rutas de Astro SSG con trailing slash
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Página de error 404 personalizada de Astro
    error_page 404 /404.html;
}
